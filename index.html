<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Francesca Loren Shopify Store</title>

  <!-- Load Shopify config first -->
  <script src="shopify-config.js"></script>
</head>
<body>
  <h1>Welcome to my custom Shopify store</h1>
  <p>Products are loading from Shopify...</p>

  <div id="products-container" style="display: flex; flex-wrap: wrap; gap: 20px;">
    <!-- Products will appear here -->
  </div>

  <script>
    const PRODUCTS_QUERY = `
      query {
        products(first: 8) {
          edges {
            node {
              id
              title
              handle
              priceRange {
                minVariantPrice {
                  amount
                  currencyCode
                }
              }
              images(first: 1) {
                edges {
                  node {
                    url
                    altText
                  }
                }
              }
            }
          }
        }
      }
    `;

    async function loadProducts() {
      try {
        const data = await window.shopifyFetch(PRODUCTS_QUERY);
        
        console.log("✅ Products loaded successfully:", data);

        const container = document.getElementById("products-container");
        container.innerHTML = "";

        data.products.edges.forEach(edge => {
          const product = edge.node;
          const price = product.priceRange.minVariantPrice;

          const html = `
            <div style="border: 1px solid #ddd; padding: 15px; width: 250px;">
              ${product.images.edges.length ? 
                `<img src="${product.images.edges[0].node.url}" style="width:100%; height:auto;">` : ''}
              <h3>${product.title}</h3>
              <p>$${price.amount} ${price.currencyCode}</p>
              <button>Add to Cart</button>
            </div>
          `;

          container.innerHTML += html;
        });

      } catch (error) {
        console.error("❌ Failed to load products:", error);
        document.getElementById("products-container").innerHTML = 
          `<p style="color: red;">Error loading products. Check console (F12) for details.</p>`;
      }
    }

    // Run when page loads
    window.addEventListener("load", loadProducts);
  </script>
</body>
</html>
